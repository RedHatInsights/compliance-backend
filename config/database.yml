<%
  require 'clowder-common-ruby/rails_config'

  if ClowderCommonRuby::Config.clowder_enabled?
    config = ClowderCommonRuby::RailsConfig.db_config
  else
    if ENV.fetch('POSTGRESQL_RDS_CA', '').present?
      ssl_root_cert = Rails.root.join('tmp', 'rdsCa')
      content = ENV.fetch('POSTGRESQL_RDS_CA', '')

      File.write(ssl_root_cert, content) unless File.exist?(ssl_root_cert)
    end

    config = {
      database:       ENV.fetch('POSTGRESQL_DATABASE', 'compliance_db'),
      username:       ENV.fetch('POSTGRESQL_USER', 'compliance_admin'),
      password:       ENV['POSTGRESQL_PASSWORD'],
      host:           ENV.fetch('POSTGRESQL_HOST', '/var/run/postgresql'),
      port:           ENV.fetch('POSTGRESQL_PORT', '5432'),
      ssl_mode:       ENV.fetch('POSTGRESQL_SSLMODE', 'prefer'),
      ssl_root_cert:  ssl_root_cert
    }
  end
%>

<%
  # Pool size must cover all threads within a single OS process.
  # In worker mode each Puma worker forks its own pool, so the per-process
  # pool only needs to match the thread count -- not threads * workers.
  max_threads   = ENV.fetch('PUMA_MAX_THREADS', 5).to_i
  explicit_pool = ENV['POSTGRESQL_MAX_CONNECTIONS']
  pool_size     = explicit_pool ? explicit_pool.to_i : [max_threads, 5].max
%>

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= pool_size %>
  username: <%= config[:username] %>
  password: <%= config[:password] %>
  host: <%= config[:host] %>
  database: <%= config[:database] %>
  port: <%= config[:port] %>
  sslmode: <%= config[:ssl_mode] || 'prefer' %>
  sslrootcert: <%= config[:ssl_root_cert]  || '' %>

test:
  <<: *default
  database: <%= ENV['POSTGRESQL_TEST_DATABASE'] || config[:database] %>

production:
  <<: *default

foreman:
  <<: *default

development:
  <<: *default
