---

- :name: "equality search by os_minor_version"
  :entities:
    :found:
      - :factory: :tailoring
        :os_minor_version: 2
        :policy_id: ${policy_id}
        :ref_id: ${ref_id}
    :not_found:
      - :factory: :tailoring
        :os_minor_version: 1
        :policy_id: ${policy_id}
        :ref_id: ${ref_id}
      - :factory: :tailoring
        :os_minor_version: 0
        :policy_id: ${policy_id}
        :ref_id: ${ref_id}
  :query: (os_minor_version = 2)
- :name: "non-equality search by os_minor_version"
  :entities:
    :found:
      - :factory: :tailoring
        :os_minor_version: 2
        :policy_id: ${policy_id}
        :ref_id: ${ref_id}
      - :factory: :tailoring
        :os_minor_version: 1
        :policy_id: ${policy_id}
        :ref_id: ${ref_id}
    :not_found:
      - :factory: :tailoring
        :os_minor_version: 0
        :policy_id: ${policy_id}
        :ref_id: ${ref_id}
  :query: (os_minor_version != 0)
