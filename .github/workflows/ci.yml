name: CI

on:
  workflow_dispatch:
  push:
    branches:
      ['master', 'hotfix']
  pull_request:
    branches:
      ['master', 'hotfix']
    types: [opened, reopened, synchronize]

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Validate commit message format
      uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed
      with:
        configFile: './.commitlint.yml'
    # FIXME: this is currently timing out
    #- name: Validate OpenAPI definition
    #  uses: swaggerexpert/swagger-editor-validate@v1
    #  with:
    #    definition-file: swagger/v2/openapi.json
    - name: Setup Ruby and install gems
      uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74
      env:
        BUNDLE_JOBS: 4
      with:
        bundler-cache: true
        rubygems: latest
        bundler: latest
    - name: Rubocop
      run: bundle exec rubocop --parallel
    - name: Brakeman
      run: bundle exec brakeman
    - name: ShellCheck
      uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38
      with:
        ignore: vendor
        check_together: true
  development-build-podman:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        persist-credentials: false
    - name: Set up the environment
      run: |
        cp .env.example .env
        pipx install podman-compose
    - name: Build using podman-compose
      run: podman-compose build
  development-build-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Set up the environment
        run: |
          cp .env.example .env
      - name: Build using docker-compose
        run: docker compose build
  unit-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: insights
          POSTGRES_DB: insights
          POSTGRES_PASSWORD: insights
        ports: ["5432:5432"]
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        persist-credentials: false
    - name: Setup Ruby and install gems
      uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74
      with:
        bundler-cache: true
        rubygems: latest
        bundler: latest
    - name: Setup database
      env:
        RAILS_ENV: test
        ACG_CONFIG: ./github-ci.json
        DATABASE_SERVICE_NAME: postgres
        POSTGRES_SERVICE_HOST: localhost
        POSTGRESQL_USER: insights
        POSTGRESQL_PASSWORD: insights
        POSTGRESQL_TEST_DATABASE: insights
      run: |
        bin/rails db:setup;
        bundle exec rails db -p < db/cyndi_setup_test.sql;
    - name: Run zeitwerk check
      env:
        RAILS_ENV: test
        ACG_CONFIG: ./github-ci.json
        DATABASE_SERVICE_NAME: postgres
        POSTGRES_SERVICE_HOST: localhost
        POSTGRESQL_USER: insights
        POSTGRESQL_PASSWORD: insights
        POSTGRESQL_TEST_DATABASE: insights
      run: bin/rails zeitwerk:check
    - name: Detect missing changes in OpenAPI spec
      env:
        RAILS_ENV: test
        SWAGGER_DRY_RUN: false
        ACG_CONFIG: ./github-ci.json
        DATABASE_SERVICE_NAME: postgres
        POSTGRES_SERVICE_HOST: localhost
        POSTGRESQL_USER: insights
        POSTGRESQL_PASSWORD: insights
        POSTGRESQL_TEST_DATABASE: insights
        SPEC_OPTS: "--color --tty --format documentation"
      run: |
        bundle exec rails db -p < db/cyndi_setup_test.sql;
        cp swagger/v2/openapi.json openapi.old.json
        bin/rake rswag:specs:swaggerize
        symbols=( '"' '[' '{' )
        for symbol in "${symbols[@]}"; do
          NEW=$(cat swagger/v2/openapi.json | tr -cd "${symbol}" | wc -c)
          OLD=$(cat openapi.old.json | tr -cd "${symbol}" | wc -c)
          rm -rf coverage
          if [[ "${OLD}" != "${NEW}" ]]; then
            echo 'OpenAPI Spec needs to be updated:'
            echo '$ bin/rake rswag:specs:swaggerize'
            diff -s -u --minimal openapi.old.json swagger/v2/openapi.json
            rm openapi.old.json
            exit 1
          fi
        done
        exit 0
    - name: Run RSpec tests
      env:
        HOSTNAME: rails
        RAILS_ENV: test
        ACG_CONFIG: ./github-ci.json
        DATABASE_SERVICE_NAME: postgres
        POSTGRES_SERVICE_HOST: localhost
        POSTGRESQL_USER: insights
        POSTGRESQL_PASSWORD: insights
        POSTGRESQL_TEST_DATABASE: insights
        SPEC_OPTS: "--color --tty --format documentation"
        RUBY_YJIT_ENABLE: 1
      run: bin/rake spec
    - name: Upload code coverage from RSpec
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
      with:
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}
        version: v10.0.1
  migration-robustness:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: insights
          POSTGRES_DB: insights
          POSTGRES_PASSWORD: insights
        ports: ["5432:5432"]
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      with:
        persist-credentials: false
    - name: Setup Ruby and install gems
      uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74
      with:
        bundler-cache: true
        rubygems: latest
        bundler: latest
    - name: Setup database and run migrations
      env:
        RAILS_ENV: test
        ACG_CONFIG: ./github-ci.json
        DATABASE_SERVICE_NAME: postgres
        POSTGRES_SERVICE_HOST: localhost
        POSTGRESQL_USER: insights
        POSTGRESQL_PASSWORD: insights
        POSTGRESQL_TEST_DATABASE: insights
      run: bin/rails db:create db:migrate
    - name: Check if migrations altered the schema.rb
      run: "! git diff --unified=0 -- db/schema.rb | grep ^+ActiveRecord"
